<!DOCTYPE html>
<html>
<head>
  <title>Employee Form</title>
  <link rel="stylesheet" href="style.css">
</head>

<body  onload="loadEditData()">

<form onsubmit="event.preventDefault(); saveData();">
<h3 style="text-align: center;">ENTER EMPLOYEE DETAILS</h3>
  
<input type="hidden" id="id">

<label>Employee name:</label>
<input type="text" id="name" placeholder="Enter Name" required><br>

<label>Gender:</label>
<select id="gender" required>
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select><br>

<label>Phone no:</label>
<input type="text" id="contact" placeholder="Enter Contact Number" required><br>

<label>Employee address:</label>
<input type="text" id="address" placeholder="Enter Address" required><br>

<label>Designation:</label>
<input type="text" id="designation" placeholder="Enter Designation" required><br>

<label>Salary:</label>
<input type="number" id="salary" placeholder="Enter Salary" required><br>

<div style="text-align: center; ">
<button type="submit">Save</button>
<button type="button" onclick="goToView()">View</button>
</div>

</form>

<script src="script.js"></script>
</body>
</html>
